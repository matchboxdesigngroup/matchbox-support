name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package plugin
        run: |
          mkdir -p build
          rsync -r --exclude-from='.distignore' . build/matchbox-support/
          cd build
          zip -r matchbox-support-${{ steps.version.outputs.VERSION }}.zip matchbox-support/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Matchbox Support ${{ github.ref_name }}
          files: build/matchbox-support-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
